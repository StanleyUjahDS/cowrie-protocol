<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">

<defs>

<radialGradient id="pearl">
    <stop offset="0" stop-color="#ffffff"/>
    <stop offset=".5" stop-color="#fff1d6"/>
    <stop offset="1" stop-color="#b88b55"/>
</radialGradient>

<linearGradient id="shell">
    <stop stop-color="#fff5e6" stop-opacity=".6"/>
    <stop offset="1" stop-color="#b88b55" stop-opacity=".1"/>
</linearGradient>

</defs>


<!-- waves -->

<path 
d="M0 220 Q400 100 800 220 T1600 220"
stroke="#d4af70"
stroke-width="3"
fill="none"
opacity=".25"/>


<path 
d="M0 700 Q400 560 800 700 T1600 700"
stroke="#d4af70"
stroke-width="3"
fill="none"
opacity=".2"/>


<!-- pearls -->

<circle cx="800" cy="250" r="35"
fill="url(#pearl)"/>


<circle cx="720" cy="200" r="25"
fill="url(#pearl)"/>


<circle cx="880" cy="200" r="25"
fill="url(#pearl)"/>


<!-- shells -->

<path
d="M260 470
C200 350 390 260 520 410
C420 360 350 420 260 470Z"
fill="url(#shell)"
stroke="#d4af70"
stroke-width="4"/>


<path
d="M1260 300
C1200 160 1420 140 1500 300
C1380 230 1320 270 1260 300Z"
fill="url(#shell)"
stroke="#d4af70"
stroke-width="4"/>


</svg>